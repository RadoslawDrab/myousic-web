name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*' # Triggers only when you push a tag like v0.2.2
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag name (e.g., v0.2.2)'
        required: true
        default: 'manual-build'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLIENT_VERSION=${{ github.event.inputs.manual_tag || github.ref_name }}
            SERVER_LOG_LEVEL=${{ secrets.SERVER_LOG_LEVEL }}
            SERVER_AUDIO_AVAILABLE=${{ secrets.SERVER_AUDIO_AVAILABLE }}
            SERVER_ITUNES_URL=${{ secrets.SERVER_ITUNES_URL }}
          tags: |
            ${{ startsWith(github.ref, 'refs/tags/') && format('radziogadzio/myousic:{0}', github.ref_name) || format('radziogadzio/myousic:{0}-dev', github.ref_name) }}
            ${{ github.ref_name == 'master' && 'radziogadzio/myousic:latest' || '' }}